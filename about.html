            <div class="card" >

                <div class="img">
                    <!---<img src="images/Image 2025-09-24 at 11.21 copy.jpg">-->s
                </div>
                <br><br><br>
                <div id="content" style="margin-left: 10%;"></div>
<div id="info-section"></div>

<!-- INFO BANNER (shown to everyone) -->
<div style="text-align:center; margin:2rem 0; padding:1.5rem; background:#111; border:2px solid #00fdd3; border-radius:10px; color:#fff;">
  <p><strong>Some information is hidden.</strong><br>
     To view the full profile, you need a token. Click the button below to enter it.</p>
  <button id="openTokenModal" style="margin-top:1rem; padding:0.8rem 1.8rem; background:#00fdd3; color:#000; border:none; border-radius:6px; font-weight:bold; cursor:pointer;">
    View Hidden Content
  </button>
</div>

<!-- TOKEN MODAL (popup) -->
<div id="tokenModal">
  <div class="modal-box">
    <button class="close-modal">×</button>
    <h3>Enter Access Token</h3>
    <input type="text" id="modalTokenInput" placeholder="Paste token here">
    <button id="modalVerifyBtn">Verify</button>
    <div class="msg" id="modalMsg"></div>
  </div>
</div>

<script>
  // === ELEMENTS ===
  const contentDiv   = document.getElementById('content');
  const modal        = document.getElementById('tokenModal');
  const openBtn      = document.getElementById('openTokenModal');
  const closeBtn     = document.querySelector('.close-modal');
  const tokenInput   = document.getElementById('modalTokenInput');
  const verifyBtn    = document.getElementById('modalVerifyBtn');
  const msg          = document.getElementById('modalMsg');

  // === OPEN / CLOSE MODAL ===
  openBtn.onclick = () => { modal.classList.add('show'); tokenInput.focus(); };
  closeBtn.onclick = () => modal.classList.remove('show');
  modal.onclick = (e) => { if (e.target === modal) modal.classList.remove('show'); };

  // === VERIFY TOKEN ===
  verifyBtn.onclick = async () => {
    const token = tokenInput.value.trim();
    if (!token) return msg.textContent = 'Enter a token';

    msg.textContent = 'Verifying...';
    try {
      const res = await fetch('/api/verify-token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token })
      });
      const data = await res.json();

      if (data.valid) {
        // SUCCESS → Load full card.html
        const cardRes = await fetch('card.html');
        const cardHTML = await cardRes.text();
        contentDiv.innerHTML = cardHTML;

        // Hide banner & close modal
        openBtn.parentElement.style.display = 'none';
        modal.classList.remove('show');
        msg.textContent = '';
      } else {
        msg.textContent = data.message || 'Invalid token';
      }
    } catch (err) {
      msg.textContent = 'Error. Try again.';
    }
  };

  // Optional: Press Enter in input → verify
  tokenInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') verifyBtn.click();
  });
</script>
        </div>
        <script src="Script.js"></script>
              
    </body>
